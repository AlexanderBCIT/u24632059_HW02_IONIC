<ion-header>
  <ion-toolbar>
    <ion-title>FilmLog Login</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <div class="auth-container">

    <ion-card>
      <ion-card-header>
        <ion-card-title>Welcome Back</ion-card-title>
        <ion-card-subtitle>Log in to manage your movies</ion-card-subtitle>
      </ion-card-header>

      <ion-card-content>

        <ion-item>
          <ion-input
            label="Email"
            labelPlacement="floating"
            type="email"
            inputmode="email"
            autocomplete="off"
            autocorrect="off"
            autocapitalize="off"
            spellcheck="false"
            [(ngModel)]="email">
          </ion-input>
        </ion-item>

        <ion-item>
          <ion-input
            label="Password"
            labelPlacement="floating"
            type="password"
            autocomplete="new-password"
            [(ngModel)]="password">
          </ion-input>
        </ion-item>

        <ion-button expand="block" class="ion-margin-top" (click)="login()">
          Log In
        </ion-button>

        <ion-button expand="block" fill="clear" (click)="goToSignup()">
          Create an account
        </ion-button>

      </ion-card-content>
    </ion-card>

  </div>

</ion-content>
